        .card { 
            background: rgba(255, 255, 255, 0.9); /* 少し透明な白 */

        }
        .btn:active {
            transform: scale(0.98);
        }
        .hidden { display: none; }
        .tsukkomi { 
            color: #e57373; /* 優しい赤 */

            margin-top: 25px; 
            padding: 15px; 
            border: 2px solid #e57373; 
            border-radius: 10px;
            background-color: #fff5f5; 
            line-height: 1.6; 
        }
        .gift-btn { 
            background-color: #ffb74d; /* 優しいオレンジ */
            color: #fff; 
            text-decoration: none; 
            padding: 18px; 
            display: inline-block; 
            width: 85%; 
            margin-top: 25px; 
            border: none; 
            font-weight: bold; 
            border-radius: 30px;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(255,183,77,0.4);
        }

            background-color: #ffa726;
        }
    </style>
</head>
<body>

    <div id="quiz-container" class="card">
        <h1 id="q-title">とーさん検定 2026</h1>
        <p id="q-text" style="font-size: 1.1rem; margin-bottom: 30px;">私のこと、どれくらい分かってるかな！</p>
        <div id="options">
            <button class="btn" onclick="startQuiz()">検定を開始する</button>
        </div>
        <p id="feedback" class="hidden"></p>
    </div>

    <div id="result-container" class="card hidden">
        <p style="font-size: 1.2rem; line-height: 1.8;">お疲れ様です！<br>どれくらい当たった？笑<br>解いたら連絡ちょうだい！！</p>
        <hr style="border: 0; border-top: 1px solid #ddd; margin: 30px 0;">
        <p style="font-size: 1.1rem;">これ参加賞プレゼントだよ</p>
        <a class="gift-btn" href="ここにハーゲンダッツのURLとかを貼る" target="_blank">🎁 プレゼントを受け取る</a>
    </div>

    <script>
        const questions = [
            { 
                q: "第1問：私が今、難しくて嘆いている講義は？", 
                a: ["マクロ経済学", "ドイツ語", "西洋史"], 
                correct: 1, 
                fail: "ドイツ語の単位を取ろうと必死なんですけど！！" 
            },
            { 
                q: "第2問：最近の私のリフレッシュ方法は？", 
                a: ["週一でサウナ（整ってます）", "ひたすら寝る", "散歩"], 
                correct: 0, 
                fail: "週一で整ってます！私のスケジュール把握しといてね。" 
            },
            { 
                q: "第3問：今の私の仕事（？）状況は？", 
                a: ["カフェ店員", "家庭教師", "ニート満喫中"], 
                correct: 2, 
                fail: "ニート満喫中ですYO！" 
            },
            { 
                q: "第4問：私が一番「お父さんに似てきたな」と思うのは？", 
                a: ["くしゃみのうるささ", "寝相の悪さ", "食べ物の好み"], 
                correct: 0, 
                fail: "あの爆音くしゃみ！毎回驚かされるから笑" 
            },
            { 
                q: "最後！今日の夕飯、私が食べたいのは？", 
                a: ["美味しい豆腐", "焼肉", "お父さんの奢りなら何でも"], 
                correct: 2, 
                fail: "お父さんの奢り一択でしょ！" 
            }
        ];

        let currentIdx = 0;

        function startQuiz() {
            currentIdx = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-title').innerText = `第 ${currentIdx + 1} 問`;
            document.getElementById('q-text').innerText = q.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            q.a.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = txt;
                btn.onclick = () => checkAnswer(i);
                optDiv.appendChild(btn);
            });
            const feedback = document.getElementById('feedback');
            feedback.classList.add('hidden');
        }

        function checkAnswer(idx) {
            const feedback = document.getElementById('feedback');
            if (idx === questions[currentIdx].correct) {
                currentIdx++;
                if (currentIdx < questions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            } else {
                feedback.innerText = questions[currentIdx].fail;
                feedback.classList.remove('hidden');
                feedback.className = "tsukkomi";
            }
        }

        function showResult() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
