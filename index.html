<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>とーさん検定2026</title>
    <style>
        /* 全体：落ち着いた薄い水色の背景 */
        body { 
            background: #f0f7f9;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #455a64; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; 
        }

        /* クイズカード：シンプルで高級感のある白 */
        .card { 
            background: #ffffff;
            padding: 50px 30px; 
            max-width: 440px; 
            width: 85%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05); 
            border-radius: 8px; /* あえて少し角を残してカチッと */
            text-align: center;
            border-top: 6px solid #81d4fa; /* 上部にアクセントカラー */
        }

        h1 { 
            font-size: 1.4rem; 
            margin-bottom: 30px; 
            color: #0288d1;
            letter-spacing: 0.1em;
        }

        #q-text {
            font-size: 1.1rem;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* ボタン：お父さんらしい落ち着いたブルー */
        .btn { 
            display: block; 
            width: 100%; 
            padding: 16px; 
            margin: 15px 0; 
            border: 1px solid #b3e5fc; 
            background-color: #fff;
            color: #0288d1; 
            cursor: pointer; 
            font-size: 1rem; 
            font-weight: bold; 
            border-radius: 4px;
            transition: all 0.3s;
        }

        .btn:hover { 
            background-color: #e1f5fe; 
            border-color: #0288d1;
        }

        /* ツッコミ：目立ちすぎない優しい赤 */
        .tsukkomi { 
            color: #d32f2f;
            font-size: 0.95rem;
            font-weight: bold; 
            margin-top: 25px; 
            padding: 15px; 
            background-color: #fff5f5; 
            border-radius: 4px;
        }

        /* プレゼントボタン：少し華やかに */
        .gift-btn { 
            background-color: #0288d1;
            color: #fff; 
            text-decoration: none; 
            padding: 18px 30px; 
            display: inline-block; 
            margin-top: 25px; 
            font-weight: bold; 
            border-radius: 4px;
            font-size: 1.1rem;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="quiz-container" class="card">
        <h1 id="q-title">とーさん検定 2026</h1>
        <p id="q-text">私のこと、どれくらい分かってるかな！</p>
        <div id="options">
            <button class="btn" onclick="startQuiz()">検定を開始する</button>
        </div>
        <p id="feedback" class="hidden"></p>
    </div>

    <div id="result-container" class="card hidden">
        <p style="font-size: 1.1rem; line-height: 1.8; color: #333;">お疲れ様です！<br>どれくらい当たった？笑<br>解いたら連絡ちょうだい！！</p>
        <hr style="border:0; border-top:1px solid #eee; margin:30px 0;">
        <p style="color: #666;">これ参加賞プレゼントだよ</p>
        <a class="gift-btn" href="ここにギフトURLを貼る" target="_blank">🎁 プレゼントを受け取る</a>
    </div>

    <script>
        const questions = [
            { q: "第1問：私が今、難しくて嘆いている講義は？", a: ["マクロ経済学", "ドイツ語", "西洋史"], correct: 1, fail: "ドイツ語の単位を取ろうと必死なんですけど！！" },
            { q: "第2問：最近の私のリフレッシュ方法は？", a: ["週一でサウナ（整ってます）", "ひたすら寝る", "散歩"], correct: 0, fail: "週一で整ってます！私のスケジュール把握しといてね。" },
            { q: "第3問：今の私の仕事（？）状況は？", a: ["カフェ店員", "家庭教師", "ニート満喫中"], correct: 2, fail: "ニート満喫中ですYO！" },
            { q: "第4問：私が一番「お父さんに似てきたな」と思うのは？", a: ["くしゃみのうるささ", "寝相の悪さ", "食べ物の好み"], correct: 0, fail: "あの爆音くしゃみ！毎回驚かされるから笑" },
            { q: "最後！今日の夕飯、私が食べたいのは？", a: ["美味しい豆腐", "焼肉", "お父さんの奢りなら何でも"], correct: 2, fail: "お父さんの奢り一択でしょ！" }
        ];

        let currentIdx = 0;
        function startQuiz() { currentIdx = 0; showQuestion(); }
        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('q-title').innerText = `第 ${currentIdx + 1} 問`;
            document.getElementById('q-text').innerText = q.q;
            const optDiv = document.getElementById('options');
            optDiv.innerHTML = "";
            q.a.forEach((txt, i) => {
                const btn = document.createElement('button');
                btn.className = "btn";
                btn.innerText = txt;
                btn.onclick = () => checkAnswer(i);
                optDiv.appendChild(btn);
            });
            document.getElementById('feedback').classList.add('hidden');
        }

        function checkAnswer(idx) {
            const feedback = document.getElementById('feedback');
            if (idx === questions[currentIdx].correct) {
                currentIdx++;
                if (currentIdx < questions.length) { showQuestion(); } 
                else { showResult(); }
            } else {
                feedback.innerText = questions[currentIdx].fail;
                feedback.classList.remove('hidden');
                feedback.className = "tsukkomi";
            }
        }

        function showResult() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-container').classList.remove('hidden');
        }
    </script>
</body>
</html>
